<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <title>Portfolio — Francesco Mancino</title>
    <script>
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?r=' + encodeURIComponent(l.pathname.slice(1) + (l.search ? l.search : '') + l.hash)
      );
    </script>
  </head>
  <body></body>
</html>
